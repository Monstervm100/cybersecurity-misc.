<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caesar Cipher</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #000;
      color: #cce8f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #050c12;
      border: 1px solid #0d2233;
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 620px;
      box-shadow: 0 8px 48px rgba(0,150,255,0.07), 0 2px 16px rgba(0,0,0,0.9);
    }

    h1 {
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #7dd4fc;
      margin-bottom: 0.3rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #1e4460;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #2e6a8a;
      margin-bottom: 0.5rem;
    }

    textarea {
      width: 100%;
      background: #020508;
      border: 1px solid #0d2233;
      border-radius: 12px;
      padding: 0.85rem 1rem;
      color: #cce8f4;
      font-size: 1rem;
      font-family: 'Courier New', monospace;
      resize: vertical;
      min-height: 110px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    textarea:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56,189,248,0.08);
    }

    .shift-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.25rem 0;
    }

    .shift-row label { margin: 0; white-space: nowrap; }

    input[type="range"] {
      flex: 1;
      accent-color: #38bdf8;
      cursor: pointer;
      height: 4px;
    }

    .shift-value {
      background: #020508;
      border: 1px solid #0d2233;
      border-radius: 8px;
      padding: 0.3rem 0.75rem;
      font-size: 1rem;
      font-family: 'Courier New', monospace;
      color: #38bdf8;
      font-weight: 700;
      min-width: 3rem;
      text-align: center;
      transition: color 0.15s ease;
    }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin: 1.25rem 0;
    }

    .btn-row button {
      flex: 1;
      padding: 0.8rem 1rem;
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      position: relative;
      overflow: hidden;
      transition: background 0.22s ease, box-shadow 0.22s ease, transform 0.12s ease;
    }

    .btn-row button:active { transform: scale(0.96) !important; }

    .btn-encrypt {
      background: #0ea5e9;
      color: #000;
      box-shadow: 0 0 0 rgba(14,165,233,0);
    }

    .btn-encrypt:hover {
      background: #38bdf8;
      box-shadow: 0 0 22px rgba(14,165,233,0.35);
      transform: translateY(-1px);
    }

    .btn-decrypt {
      background: #020c14;
      color: #38bdf8;
      border: 1px solid #0d2233;
      box-shadow: 0 0 0 rgba(56,189,248,0);
    }

    .btn-decrypt:hover {
      background: #071828;
      border-color: #38bdf8;
      box-shadow: 0 0 18px rgba(56,189,248,0.15);
      transform: translateY(-1px);
    }

    .alphabet-wrapper {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
    }

    .alphabet-preview {
      background: #020508;
      border: 1px solid #0d2233;
      border-radius: 12px;
      padding: 0.75rem 1rem;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      color: #2e6a8a;
      overflow-x: auto;
    }

    .alphabet-preview span { color: #38bdf8; }

    .alphabet-mist {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      background: linear-gradient(135deg, rgba(0,5,12,0.85), rgba(0,18,36,0.8));
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      color: #2e6a8a;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: opacity 0.3s ease;
    }

    .alphabet-mist:hover { color: #7dd4fc; }
    .alphabet-mist:hover svg { stroke: #7dd4fc; }

    .alphabet-mist svg {
      width: 13px; height: 13px;
      stroke: #2e6a8a;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.2s ease;
    }

    .alphabet-wrapper.revealed .alphabet-mist {
      opacity: 0;
      pointer-events: none;
    }

    .divider {
      border: none;
      border-top: 1px solid #0d2233;
      margin: 1.75rem 0;
    }

    .output-section {
      margin-top: 1.25rem;
      animation: fadeSlideIn 0.25s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .output-box {
      position: relative;
      background: #020508;
      border: 1px solid #0d2233;
      border-radius: 12px;
      padding: 1rem 3.5rem 1rem 1rem;
      min-height: 60px;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      color: #7dd4fc;
      line-height: 1.6;
    }

    .output-box span {
      white-space: pre-wrap;
      word-break: break-all;
    }

    .output-box.decrypt { color: #93c5fd; }

    .copy-btn {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      width: fit-content;
      background: #0d2233;
      border: 1px solid #133348;
      border-radius: 8px;
      color: #2e6a8a;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 0.3rem 0.65rem;
      cursor: pointer;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      white-space: nowrap;
      transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, transform 0.1s ease;
    }

    .copy-btn svg {
      width: 11px; height: 11px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .copy-btn:hover {
      background: #102030;
      border-color: #38bdf8;
      color: #7dd4fc;
      box-shadow: 0 0 10px rgba(56,189,248,0.15);
    }

    .copy-btn:active { transform: scale(0.93); }

    .copy-btn.copied {
      background: #0a2a1a;
      border-color: #22c55e;
      color: #4ade80;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(2rem);
      background: #0ea5e9;
      color: #000;
      padding: 0.5rem 1.25rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.22s ease, transform 0.22s cubic-bezier(0.22,1,0.36,1);
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Caesar Cipher</h1>
  <p class="subtitle">Shift letters by a fixed amount to encrypt or decrypt text</p>

  <label for="inputText">Input Text</label>
  <textarea id="inputText" placeholder="Type your message here..."></textarea>

  <div class="shift-row">
    <label for="shiftSlider">Shift</label>
    <input type="range" id="shiftSlider" min="1" max="25" value="3" oninput="updateShift(this.value)" />
    <div class="shift-value" id="shiftDisplay">3</div>
  </div>

  <div class="alphabet-wrapper" id="alphabetWrapper" onclick="toggleMist()">
    <div class="alphabet-preview" id="alphabetPreview"></div>
    <div class="alphabet-mist" id="alphabetMist">
      <svg viewBox="0 0 24 24">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
        <line x1="3" y1="3" x2="21" y2="21"/>
      </svg>
      Click to reveal
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-encrypt" onclick="runCipher('encrypt')">Encrypt</button>
    <button class="btn-decrypt" onclick="runCipher('decrypt')">Decrypt</button>
  </div>

  <hr class="divider" />

  <div id="encryptOutput" style="display:none">
    <label>Encrypted</label>
    <div class="output-section">
      <div class="output-box" id="encryptBox">
        <button class="copy-btn" id="copyEncryptBtn" onclick="copyText('encrypt', this)">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          copy
        </button>
        <span id="encryptText"></span>
      </div>
    </div>
  </div>

  <div id="decryptOutput" style="display:none; margin-top: 1.5rem;">
    <label>Decrypted</label>
    <div class="output-section">
      <div class="output-box decrypt" id="decryptBox">
        <button class="copy-btn" id="copyDecryptBtn" onclick="copyText('decrypt', this)">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          copy
        </button>
        <span id="decryptText"></span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
  let shift = 3;

  function cipher(text, n) {
    return text.split('').map(ch => {
      if (ch >= 'A' && ch <= 'Z')
        return String.fromCharCode(((ch.charCodeAt(0) - 65 + n + 26) % 26) + 65);
      if (ch >= 'a' && ch <= 'z')
        return String.fromCharCode(((ch.charCodeAt(0) - 97 + n + 26) % 26) + 97);
      return ch;
    }).join('');
  }

  function updateShift(val) {
    shift = parseInt(val);
    document.getElementById('shiftDisplay').textContent = shift;
    updateAlphabetPreview();
    const text = document.getElementById('inputText').value;
    if (document.getElementById('encryptOutput').style.display !== 'none')
      document.getElementById('encryptText').textContent = cipher(text, shift);
    if (document.getElementById('decryptOutput').style.display !== 'none')
      document.getElementById('decryptText').textContent = cipher(text, -shift);
  }

  function updateAlphabetPreview() {
    const orig = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const shifted = cipher(orig, shift);
    document.getElementById('alphabetPreview').innerHTML =
      `Plain:&nbsp;&nbsp;&nbsp;<span>${orig}</span><br>Cipher:&nbsp;&nbsp;<span>${shifted}</span>`;
  }

  function runCipher(mode) {
    const text = document.getElementById('inputText').value;
    if (!text.trim()) return;

    function animateSection(sectionId, spanId, content) {
      const wrapper = document.getElementById(sectionId);
      wrapper.style.display = 'block';
      const sec = wrapper.querySelector('.output-section');
      sec.style.animation = 'none';
      sec.offsetHeight;
      sec.style.animation = '';
      document.getElementById(spanId).textContent = content;
    }

    if (mode === 'encrypt') {
      animateSection('encryptOutput', 'encryptText', cipher(text, shift));
    } else {
      animateSection('decryptOutput', 'decryptText', cipher(text, -shift));
    }
  }

  function copyText(mode, btn) {
    const el = document.getElementById(mode === 'encrypt' ? 'encryptText' : 'decryptText');
    const text = el.textContent;
    if (!text) return;

    const doFeedback = () => {
      btn.classList.add('copied');
      btn.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> copied`;
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
        btn.classList.remove('copied');
        btn.innerHTML = `<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> copy`;
      }, 1800);
    };

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(doFeedback).catch(() => fallbackCopy(text, doFeedback));
    } else {
      fallbackCopy(text, doFeedback);
    }
  }

  function fallbackCopy(text, cb) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try { document.execCommand('copy'); cb(); } catch(e) {}
    document.body.removeChild(ta);
  }

  document.getElementById('inputText').addEventListener('input', () => {
    const text = document.getElementById('inputText').value;
    if (document.getElementById('encryptOutput').style.display !== 'none')
      document.getElementById('encryptText').textContent = cipher(text, shift);
    if (document.getElementById('decryptOutput').style.display !== 'none')
      document.getElementById('decryptText').textContent = cipher(text, -shift);
  });

  function toggleMist() {
    document.getElementById('alphabetWrapper').classList.toggle('revealed');
  }

  updateAlphabetPreview();
</script>

</body>
</html>
